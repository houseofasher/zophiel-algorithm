# Nomad Sovereign Stack — nginx edge WAF + DDoS rate limits
# Place in front of gateway (:8080) and console (:8081)
#
# OPERATORS: Set $CONSOLE_ALLOW_CIDR to your management network before deployment.
# Example: include a snippet that maps your VPN/office CIDR into geo below.

limit_req_zone $binary_remote_addr zone=nomad_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=nomad_console:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=nomad_conn:10m;

# Console IP allowlist — default DENY; explicit CIDRs must be added before production.
geo $console_allowed {
    default 0;
    # ADD YOUR MANAGEMENT CIDR BLOCKS HERE — see README
    # Replace $CONSOLE_ALLOW_CIDR with your trusted management range, e.g.:
    # 10.0.0.0/8 1;
    # 203.0.113.0/24 1;
    127.0.0.1 1;
}

server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    limit_conn nomad_conn 50;
    limit_req zone=nomad_api burst=60 nodelay;

    if ($query_string ~* "(union.*select|insert.*into|drop.*table)") { return 403; }
    if ($request_uri ~* "\.\./") { return 403; }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-Id $request_id;
        client_max_body_size 64k;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.example.com;

    ssl_protocols TLSv1.3;

    # SECURITY: This console endpoint MUST be restricted to known management
    # IPs before any production deployment. Failure to configure the geo
    # block above is a critical security misconfiguration.

    if ($console_allowed = 0) {
        return 403;
    }

    limit_req zone=nomad_console burst=5 nodelay;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
